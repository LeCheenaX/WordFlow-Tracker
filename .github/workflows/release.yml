name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Generate release notes from changelog
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const tag = process.env.RELEASE_TAG;
          const normalizedTag = tag.replace(/^v/, '');
          const source = fs.readFileSync('src/changeLog.ts', 'utf8');
          const enMatch = source.match(/'en'\s*:\s*`([\s\S]*?)`,\s*'zh-CN'/);

          if (!enMatch) {
            throw new Error('Could not find the English changelog section in src/changeLog.ts');
          }

          const sections = enMatch[1]
            .split(/\r?\n(?=###\s+)/)
            .map((section) => section.trim())
            .filter(Boolean);

          const releaseSection = sections.find((section) =>
            section.startsWith(`### ${tag} updates`) ||
            section.startsWith(`### ${normalizedTag} updates`)
          );

          if (!releaseSection) {
            throw new Error(`Could not find English changelog notes for ${tag}`);
          }

          const notes = releaseSection
            .split(/\r?\n/)
            .slice(1)
            .join('\n')
            .trim();

          if (!notes) {
            throw new Error(`English changelog notes for ${tag} are empty`);
          }

          fs.writeFileSync('release-notes.md', `${notes}\n`);
          NODE

      - name: Generate artifact attestation for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ github.workspace }}/main.js"

      - name: Generate artifact attestation for styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ github.workspace }}/styles.css"

      - name: Generate artifact attestation for manifest.json
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ github.workspace }}/manifest.json"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --notes-file release-notes.md \
            --latest \
            main.js manifest.json styles.css
