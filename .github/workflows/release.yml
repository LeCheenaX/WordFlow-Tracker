name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Generate artifact attestation for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ github.workspace }}/main.js"

      - name: Generate artifact attestation for styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ github.workspace }}/styles.css"

      - name: Generate artifact attestation for manifest.json
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "${{ github.workspace }}/manifest.json"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css