<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordflow Tracker – Heatmap View</title>
<style>
  /* ── Obsidian Default Theme tokens (light) ── */
  :root {
    --background-primary:          #ffffff;
    --background-secondary:        #f2f3f5;
    --background-modifier-border:  #ddd;
    --background-modifier-hover:   #e9e9e9;
    --text-normal:                 #2e3338;
    --text-muted:                  #888888;
    --text-faint:                  #b0b0b0;
    --text-accent:                 #7c6af7;
    --text-accent-hover:           #6355d8;
    --text-on-accent:              #ffffff;
    --interactive-accent:          #7c6af7;
    --nav-item-color:              #444444;
    --tab-text-color:              #888888;
    --font-text:                   -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-text);
    padding: 40px;
  }

  /* Obsidian window chrome */
  .ob-window {
    width: 340px;
    background: var(--background-primary);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08);
  }

  /* Fake title bar */
  .ob-titlebar {
    background: #f0f0f0;
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    border-bottom: 1px solid var(--background-modifier-border);
  }
  .ob-titlebar-dot { width: 12px; height: 12px; border-radius: 50%; }
  .ob-titlebar-dot.red    { background: #ff5f57; }
  .ob-titlebar-dot.yellow { background: #febc2e; }
  .ob-titlebar-dot.green  { background: #28c840; }
  .ob-titlebar-title {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 52px;
  }

  /* Plugin panel body */
  .ob-panel {
    padding: 0 16px 20px;
    color: var(--text-normal);
    font-size: 14px;
  }

  /* ── Title row ── */
  .wf-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    margin-bottom: 16px;
  }
  .wf-title {
    font-size: 1.4em;
    font-weight: 700;
    color: var(--text-normal);
  }
  .wf-view-switcher {
    display: flex;
    border: 1px solid var(--background-modifier-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .wf-view-btn {
    background: none;
    border: none;
    border-right: 1px solid var(--background-modifier-border);
    cursor: pointer;
    padding: 4px 8px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 0;
  }
  .wf-view-btn:last-child { border-right: none; }
  .wf-view-btn.active {
    background: var(--interactive-accent);
    color: var(--text-on-accent);
  }
  .wf-view-btn svg { width: 14px; height: 14px; }

  /* ── Current note row ── */
  .wf-current-note {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--background-modifier-border);
    font-size: 18px;
  }
  .wf-current-note-left {
    display: flex; flex-direction: column;
    flex: 1; min-width: 0; margin-right: 8px;
  }
  .wf-current-note-text { display: flex; align-items: baseline; gap: 12px; }
  .wf-current-note-label {
    font-weight: bold; color: var(--text-normal);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .wf-current-note-value {
    font-weight: bold; color: var(--text-accent);
    white-space: nowrap; flex-shrink: 0;
  }
  .wf-bar-container {
    display: flex; height: 8px; border-radius: 4px; overflow: hidden;
    background: var(--background-modifier-hover); margin-top: 5px; width: 72%;
  }
  .wf-bar-existing { height: 100%; background: var(--tab-text-color); width: 55%; }
  .wf-bar-current  { height: 100%; background: var(--text-accent); width: 45%; }
  .wf-current-note-buttons { display: flex; gap: 8px; flex-shrink: 0; }
  .wf-btn-circle {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--background-modifier-border);
    background: var(--background-secondary);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .wf-btn-circle svg { width: 16px; height: 16px; }

  /* ── Controls row ── */
  .wf-controls {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .wf-period-name {
    font-size: 20px; font-weight: bold; color: var(--text-accent); padding: 0 4px;
  }
  .wf-field-total {
    font-size: 20px; font-weight: 350; color: var(--text-normal);
    display: flex; align-items: center; gap: 4px;
  }
  .wf-field-name { color: var(--text-muted); }

  /* ── Heatmap ── */
  .wf-heatmap-container {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .wf-month-labels {
    display: grid;
    gap: 3px;
    padding-left: 30px;
  }
  .wf-month-label {
    font-size: 10px; color: var(--text-muted); text-align: center;
  }
  .wf-grid-container {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 6px;
    align-items: start;
  }
  .wf-weekday-labels {
    display: grid;
    grid-template-rows: repeat(7, 1fr);
    gap: 3px;
    height: 100%;
  }
  .wf-weekday-label {
    font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 2px;
  }
  .wf-cells {
    display: grid;
    grid-auto-rows: 1fr;
    gap: 3px;
  }
  .wf-cell {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 3px;
    border: 1px solid var(--background-modifier-border);
    cursor: pointer;
  }
  .wf-cell.empty  { background: transparent; }
  .wf-cell.future { background: transparent; opacity: 0.3; }
  .wf-cell.today  {
    outline: 2px solid var(--text-accent);
    outline-offset: -1px;
    border-radius: 3px;
  }
  .wf-legend {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 4px; margin-top: 4px;
  }
  .wf-legend-label { font-size: 10px; color: var(--text-muted); }
  .wf-legend-cell  {
    width: 14px; aspect-ratio: 1/1;
    border-radius: 3px;
    border: 1px solid var(--background-modifier-border);
  }
</style>
</head>
<body>

<div class="ob-window">
  <div class="ob-titlebar">
    <div class="ob-titlebar-dot red"></div>
    <div class="ob-titlebar-dot yellow"></div>
    <div class="ob-titlebar-dot green"></div>
    <span class="ob-titlebar-title">Wordflow Tracker</span>
  </div>

  <div class="ob-panel">

    <!-- Title + view switcher -->
    <div class="wf-title-row">
      <span class="wf-title">Daily Notes</span>
      <div class="wf-view-switcher">
        <button class="wf-view-btn" title="File List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </button>
        <button class="wf-view-btn" title="Tag List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </button>
        <button class="wf-view-btn active" title="Heatmap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Current note row -->
    <div class="wf-current-note">
      <div class="wf-current-note-left">
        <div class="wf-current-note-text">
          <span class="wf-current-note-label">Meeting Summary</span>
          <span class="wf-current-note-value">900</span>
        </div>
        <div class="wf-bar-container">
          <span class="wf-bar-existing" style="width:57%"></span>
          <span class="wf-bar-current" style="width:43%"></span>
        </div>
      </div>
      <div class="wf-current-note-buttons">
        <!-- record button: file-clock icon (record wordflows to periodic notes) -->
        <div class="wf-btn-circle" title="record wordflows to periodic notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <circle cx="12" cy="15" r="3"/>
            <line x1="12" y1="12" x2="12" y2="15"/>
          </svg>
        </div>
        <!-- focus button: play icon -->
        <div class="wf-btn-circle" title="start focusing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Controls row -->
    <div class="wf-controls">
      <span class="wf-period-name">Today</span>
      <div class="wf-field-total">
        <span class="wf-field-name">Words</span>:
        <span>8,472</span>
      </div>
    </div>

    <!-- Heatmap (rendered by JS) -->
    <div class="wf-heatmap-container" id="heatmap"></div>

  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const WEEKS        = 12;
const TODAY_STR    = '2026-05-16';
// Default plugin color: #33C15E  →  hue ≈ 137°
const BASE_HEX     = '#33C15E';
const GRAD_LEVELS  = 5; // default heatmapGradientLevels

// ── Date helpers ─────────────────────────────────────────────────────────────
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

// ── Color scale – mirrors HeatmapColorManager exactly ────────────────────────
function hexToHue(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  if (max === min) return 0;
  const d = max - min;
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
  else if (max === g) h = ((b - r) / d + 2) / 6;
  else h = ((r - g) / d + 4) / 6;
  return Math.round(h * 360);
}

function makeColorScale(baseHex, levels) {
  const hue = hexToHue(baseHex);
  const n = levels - 1; // actual gradient steps (excludes zero level)
  const scale = [];
  for (let i = 0; i < n; i++) {
    const t = (n === 1) ? 0 : i / (n - 1);
    const l = 80 - (80 - 25) * t;          // 80% → 25%
    const s = 70 + (95 - 70) * t;          // 70% → 95%
    scale.push(`hsl(${hue},${s.toFixed(1)}%,${l.toFixed(1)}%)`);
  }
  return scale;
}

const colorScale = makeColorScale(BASE_HEX, GRAD_LEVELS);

function getColor(value, allValues) {
  if (!value || value === 0) return null;
  const sorted = [...allValues].filter(v => v > 0).sort((a, b) => a - b);
  if (sorted.length === 0) return colorScale[0];
  let minV, maxV;
  if (sorted.length <= 6) {
    minV = sorted[0]; maxV = sorted[sorted.length - 1];
  } else {
    minV = sorted[3]; maxV = sorted[sorted.length - 4];
  }
  if (minV === maxV) return colorScale[Math.floor(colorScale.length / 2)];
  let norm = Math.max(0, Math.min(1, (value - minV) / (maxV - minV)));
  const idx = Math.min(colorScale.length - 1, Math.floor(norm * colorScale.length));
  return colorScale[idx];
}

// ── Deterministic pseudo-random (seeded LCG) ─────────────────────────────────
// Ensures identical output on every page load — no more flickering colors.
function makePRNG(s) {
  let state = s >>> 0;
  return function() {
    state = (Math.imul(1664525, state) + 1013904223) >>> 0;
    return state / 0x100000000;
  };
}
const rng = makePRNG(0xDEADBEEF);

// ── Synthetic data ────────────────────────────────────────────────────────────
const todayDate = parseDate(TODAY_STR);
const endDate   = todayDate;
const startDate = addDays(endDate, -(WEEKS * 7 - 1));

const seed = {};
let cur = new Date(startDate);
while (cur <= endDate) {
  const key = fmtDate(cur);
  const dow  = cur.getDay();
  const base = (dow === 0 || dow === 6) ? 280 : 680;
  seed[key]  = rng() < 0.13 ? 0 : Math.round(base + (rng() - 0.3) * base * 1.1);
  cur = addDays(cur, 1);
}
// Spike days for visual interest
['2026-03-09','2026-03-23','2026-04-06','2026-04-20','2026-05-04','2026-05-11']
  .forEach(k => { if (seed[k] !== undefined) seed[k] = Math.round(1700 + rng() * 500); });
seed[TODAY_STR] = 1284;

const allValues = Object.values(seed).filter(v => v > 0);

// ── Render ────────────────────────────────────────────────────────────────────
const container = document.getElementById('heatmap');

// Month labels
const monthDiv = document.createElement('div');
monthDiv.className = 'wf-month-labels';
monthDiv.style.gridTemplateColumns = `repeat(${WEEKS}, 1fr)`;
const monthsSeen = new Set();
let scanDate = new Date(startDate);
for (let w = 0; w < WEEKS; w++) {
  let label = '';
  for (let d = 0; d < 7; d++) {
    const check = addDays(scanDate, d);
    if (check.getDate() === 1) {
      const mon = check.toLocaleString('en', { month: 'short' });
      if (!monthsSeen.has(mon)) { label = mon; monthsSeen.add(mon); }
      break;
    }
  }
  const sp = document.createElement('span');
  sp.className = 'wf-month-label';
  sp.style.gridColumn = String(w + 1);
  sp.textContent = label;
  monthDiv.appendChild(sp);
  scanDate = addDays(scanDate, 7);
}
container.appendChild(monthDiv);

// Grid
const gridDiv = document.createElement('div');
gridDiv.className = 'wf-grid-container';

// Weekday labels (Sun-start: Mon=row2, Wed=row4, Fri=row6)
const wdDiv = document.createElement('div');
wdDiv.className = 'wf-weekday-labels';
[['Mon', 2], ['Wed', 4], ['Fri', 6]].forEach(([name, row]) => {
  const sp = document.createElement('span');
  sp.className = 'wf-weekday-label';
  sp.style.gridRow = String(row);
  sp.textContent = name;
  wdDiv.appendChild(sp);
});
gridDiv.appendChild(wdDiv);

// Cells
const cellsDiv = document.createElement('div');
cellsDiv.className = 'wf-cells';
cellsDiv.style.gridTemplateColumns = `repeat(${WEEKS}, 1fr)`;
cellsDiv.style.aspectRatio = `${WEEKS} / 7`;

let cellDate = new Date(startDate);
for (let w = 0; w < WEEKS; w++) {
  for (let d = 0; d < 7; d++) {
    const key     = fmtDate(cellDate);
    const isFuture = cellDate > todayDate;
    const isToday  = key === TODAY_STR;
    const value    = seed[key] || 0;

    const cell = document.createElement('div');
    cell.className = 'wf-cell';
    cell.style.gridColumn = String(w + 1);
    cell.style.gridRow    = String(d + 1);

    if (isFuture) {
      cell.classList.add('future');
    } else if (value > 0) {
      cell.style.backgroundColor = getColor(value, allValues);
    } else {
      cell.classList.add('empty');
    }
    if (isToday) cell.classList.add('today');
    cell.title = isFuture ? key : (value > 0 ? `${key}: ${value.toLocaleString()} words` : `${key}: no data`);

    cellsDiv.appendChild(cell);
    cellDate = addDays(cellDate, 1);
  }
}
gridDiv.appendChild(cellsDiv);
container.appendChild(gridDiv);

// Legend
const legendDiv = document.createElement('div');
legendDiv.className = 'wf-legend';
const lessLbl = document.createElement('span');
lessLbl.className = 'wf-legend-label';
lessLbl.textContent = 'Less';
legendDiv.appendChild(lessLbl);

// empty cell
const emptyLc = document.createElement('div');
emptyLc.className = 'wf-legend-cell';
legendDiv.appendChild(emptyLc);

colorScale.forEach(color => {
  const lc = document.createElement('div');
  lc.className = 'wf-legend-cell';
  lc.style.backgroundColor = color;
  legendDiv.appendChild(lc);
});

const moreLbl = document.createElement('span');
moreLbl.className = 'wf-legend-label';
moreLbl.textContent = 'More';
legendDiv.appendChild(moreLbl);
container.appendChild(legendDiv);
</script>
</body>
</html>
