<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordflow Tracker – Table View</title>
<style>
  /* ── Obsidian Default Theme tokens (light) ── */
  :root {
    --background-primary:         #ffffff;
    --background-secondary:       #f2f3f5;
    --background-modifier-border: #ddd;
    --background-modifier-hover:  #e9e9e9;
    --text-normal:                #2e3338;
    --text-muted:                 #888888;
    --text-faint:                 #b0b0b0;
    --text-accent:                #7c6af7;
    --text-on-accent:             #ffffff;
    --interactive-accent:         #7c6af7;
    --link-color:                 #5c7cfa;
    --font-text: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-text);
    padding: 40px 24px;
  }

  /* ── Obsidian note window ── */
  .ob-window {
    background: var(--background-primary);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08);
    width: fit-content;
    max-width: 900px;
  }

  .ob-titlebar {
    background: #f0f0f0;
    height: 36px;
    display: flex; align-items: center;
    padding: 0 14px; gap: 8px;
    border-bottom: 1px solid var(--background-modifier-border);
  }
  .ob-titlebar-dot { width: 12px; height: 12px; border-radius: 50%; }
  .ob-titlebar-dot.red    { background: #ff5f57; }
  .ob-titlebar-dot.yellow { background: #febc2e; }
  .ob-titlebar-dot.green  { background: #28c840; }
  .ob-titlebar-title {
    flex: 1; text-align: center; font-size: 12px;
    color: var(--text-muted); margin-right: 52px;
  }

  /* ── Note content area ── */
  .ob-content {
    padding: 32px 40px 40px;
  }

  /* Note title (H1) */
  .note-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-normal);
    margin-bottom: 24px;
    line-height: 1.2;
  }

  /* ── Markdown table ── */
  table {
    border-collapse: collapse;
    font-size: 13.5px;
    color: var(--text-normal);
    width: 100%;
  }

  th {
    background: var(--background-secondary);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 8px 12px;
    border: 1px solid var(--background-modifier-border);
    white-space: nowrap;
    text-align: left;
  }

  td {
    padding: 7px 12px;
    border: 1px solid var(--background-modifier-border);
    vertical-align: middle;
    line-height: 1.4;
  }

  tr:nth-child(even) td {
    background: rgba(0,0,0,0.018);
  }

  /* ── Note link ── */
  .note-link {
    color: var(--link-color);
    text-decoration: none;
    font-weight: 500;
    white-space: nowrap;
  }
  .note-link:hover { text-decoration: underline; }

  /* ── Stat bar (mirrors styles.css exactly) ── */
  .stat-bar-container {
    display: inline-flex;
    width: 120px;
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    vertical-align: middle;
  }
  .stat-bar { height: 100%; }
  .stat-bar.origin  { background-color: #FFD700; border-radius: 6px 0 0 6px; }
  .stat-bar.deleted { background-color: #FF4D4D; }
  .stat-bar.added   { background-color: #00CC66; border-radius: 0 6px 6px 0; }

  /* ── Diff text ── */
  .diff-text {
    font-size: 12px;
    color: var(--text-muted);
    max-width: 220px;
    line-height: 1.45;
  }

  /* ── Time values ── */
  .time-val {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-normal);
    white-space: nowrap;
  }

  /* ── Modified time ── */
  .mtime {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="ob-window">
  <div class="ob-titlebar">
    <div class="ob-titlebar-dot red"></div>
    <div class="ob-titlebar-dot yellow"></div>
    <div class="ob-titlebar-dot green"></div>
    <span class="ob-titlebar-title">2026-05-16.md</span>
  </div>

  <div class="ob-content">
    <div class="note-title">2026-05-16</div>

    <table>
      <thead>
        <tr>
          <th>Note</th>
          <th>Stat</th>
          <th>Diff</th>
          <th>Focused</th>
          <th>Modified</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
// ── Data (consistent with other promo files) ──────────────────────────────────
// statBar: origin=gold, deleted=red, added=green
// originPortion = originWords / (originWords + addedWords) * 100  (capped to bar width)
// Simplified: we set proportions directly for visual clarity.

const rows = [
  {
    name: 'Chapter 3 – Revision',
    // origin 58%, deleted 8%, added 34%  → heavy editing session
    stat: { op: 58, dp: 8, ap: 34 },
    diff: 'Restructured opening argument; tightened prose in §2–§4.',
    focused: '47 min',
    mtime: '21:34',
  },
  {
    name: 'Chapter 4 – Draft',
    // origin 72%, deleted 5%, added 23%
    stat: { op: 72, dp: 5, ap: 23 },
    diff: 'Added new scene outline; minor wording fixes.',
    focused: '27 min',
    mtime: '19:08',
  },
  {
    name: 'Research Notes',
    // origin 65%, deleted 12%, added 23%
    stat: { op: 65, dp: 12, ap: 23 },
    diff: 'Inserted three new citations; removed outdated references.',
    focused: '31 min',
    mtime: '16:52',
  },
  {
    name: 'Reading Notes – Vol.2',
    // origin 80%, deleted 4%, added 16%
    stat: { op: 80, dp: 4, ap: 16 },
    diff: 'Annotated chapter 7 highlights.',
    focused: '21 min',
    mtime: '14:20',
  },
  {
    name: 'Project Outline',
    // origin 55%, deleted 15%, added 30%
    stat: { op: 55, dp: 15, ap: 30 },
    diff: 'Revised milestone dates; expanded deliverables section.',
    focused: '14 min',
    mtime: '11:45',
  },
  {
    name: 'Meeting Summary',
    // origin 70%, deleted 6%, added 24%
    stat: { op: 70, dp: 6, ap: 24 },
    diff: 'Transcribed action items from morning standup.',
    focused: '8 min',
    mtime: '09:17',
  },
  {
    name: 'Inbox',
    // origin 90%, deleted 2%, added 8%
    stat: { op: 90, dp: 2, ap: 8 },
    diff: 'Quick capture: three fleeting notes.',
    focused: '6 min',
    mtime: '08:03',
  },
];

const tbody = document.getElementById('table-body');

rows.forEach(r => {
  const tr = document.createElement('tr');

  // Note link
  const tdName = document.createElement('td');
  const a = document.createElement('a');
  a.className = 'note-link';
  a.href = '#';
  a.textContent = r.name;
  tdName.appendChild(a);

  // Stat bar
  const tdStat = document.createElement('td');
  const bar = document.createElement('span');
  bar.className = 'stat-bar-container';
  bar.innerHTML = `
    <span class="stat-bar origin"  style="width:${r.stat.op}%"></span>
    <span class="stat-bar deleted" style="width:${r.stat.dp}%"></span>
    <span class="stat-bar added"   style="width:${r.stat.ap}%"></span>
  `;
  tdStat.appendChild(bar);

  // Diff
  const tdDiff = document.createElement('td');
  const diffSpan = document.createElement('span');
  diffSpan.className = 'diff-text';
  diffSpan.textContent = r.diff;
  tdDiff.appendChild(diffSpan);

  // Focused
  const tdFocused = document.createElement('td');
  tdFocused.className = 'time-val';
  tdFocused.textContent = r.focused;

  // Modified time
  const tdMtime = document.createElement('td');
  tdMtime.className = 'mtime';
  tdMtime.textContent = r.mtime;

  tr.appendChild(tdName);
  tr.appendChild(tdStat);
  tr.appendChild(tdDiff);
  tr.appendChild(tdFocused);
  tr.appendChild(tdMtime);
  tbody.appendChild(tr);
});
</script>
</body>
</html>
