<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordflow Tracker – Tag List View</title>
<style>
  /* ── Obsidian Default Theme tokens (light) ── */
  :root {
    --background-primary:         #ffffff;
    --background-secondary:       #f2f3f5;
    --background-modifier-border: #ddd;
    --background-modifier-hover:  #e9e9e9;
    --text-normal:                #2e3338;
    --text-muted:                 #888888;
    --text-faint:                 #b0b0b0;
    --text-accent:                #7c6af7;
    --text-on-accent:             #ffffff;
    --interactive-accent:         #7c6af7;
    --nav-item-color:             #444444;
    --tab-text-color:             #888888;
    --font-text: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font-text);
    padding: 40px;
  }

  .ob-window {
    width: 340px;
    background: var(--background-primary);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08);
  }

  .ob-titlebar {
    background: #f0f0f0;
    height: 36px;
    display: flex; align-items: center;
    padding: 0 14px; gap: 8px;
    border-bottom: 1px solid var(--background-modifier-border);
  }
  .ob-titlebar-dot { width: 12px; height: 12px; border-radius: 50%; }
  .ob-titlebar-dot.red    { background: #ff5f57; }
  .ob-titlebar-dot.yellow { background: #febc2e; }
  .ob-titlebar-dot.green  { background: #28c840; }
  .ob-titlebar-title {
    flex: 1; text-align: center; font-size: 12px;
    color: var(--text-muted); margin-right: 52px;
  }

  .ob-panel {
    padding: 0 16px 20px;
    color: var(--text-normal);
    font-size: 14px;
  }

  /* Title row */
  .wf-title-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; margin-bottom: 16px;
  }
  .wf-title { font-size: 1.4em; font-weight: 700; color: var(--text-normal); }
  .wf-view-switcher {
    display: flex;
    border: 1px solid var(--background-modifier-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .wf-view-btn {
    background: none;
    border: none;
    border-right: 1px solid var(--background-modifier-border);
    cursor: pointer;
    padding: 4px 8px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 0;
  }
  .wf-view-btn:last-child { border-right: none; }
  .wf-view-btn.active { background: var(--interactive-accent); color: var(--text-on-accent); }
  .wf-view-btn svg { width: 14px; height: 14px; }

  /* Current note row */
  .wf-current-note {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--background-modifier-border);
    font-size: 18px;
  }
  .wf-current-note-left { display: flex; flex-direction: column; flex: 1; min-width: 0; margin-right: 8px; }
  .wf-current-note-text { display: flex; align-items: baseline; gap: 12px; }
  .wf-current-note-label { font-weight: bold; color: var(--text-normal); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wf-current-note-value { font-weight: bold; color: var(--text-accent); white-space: nowrap; flex-shrink: 0; }
  .wf-bar-container {
    display: flex; height: 8px; border-radius: 4px; overflow: hidden;
    background: var(--background-modifier-hover); margin-top: 5px; width: 72%;
  }
  .wf-bar-existing { height: 100%; background: var(--tab-text-color); width: 55%; }
  .wf-bar-current  { height: 100%; background: var(--text-accent); width: 45%; }
  .wf-current-note-buttons { display: flex; gap: 8px; flex-shrink: 0; }
  .wf-btn-circle {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--background-modifier-border);
    background: var(--background-secondary);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .wf-btn-circle svg { width: 16px; height: 16px; }

  /* Controls row */
  .wf-controls {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .wf-period-name { font-size: 20px; font-weight: bold; color: var(--text-accent); padding: 0 4px; }
  .wf-field-total { font-size: 20px; font-weight: 350; color: var(--text-normal); display: flex; align-items: center; gap: 4px; }
  .wf-field-name { color: var(--text-muted); }

  /* ── Dual-layer progress bar ── */
  .wf-dual-layer {
    border-radius: 5px;
    overflow: hidden;
    background: var(--background-modifier-hover);
    margin-bottom: 8px;
  }
  .wf-tag-layer {
    height: 16px;
    display: flex;
    width: 100%;
    background: var(--background-modifier-hover);
  }
  .wf-file-layer {
    height: 4px;
    display: flex;
    width: 100%;
    background: var(--background-modifier-hover);
  }
  .wf-seg { height: 100%; }

  /* ── Tag group list ── */
  .wf-tag-list { margin-top: 8px; }

  /* Tag group row */
  .wf-tag-group-row {
    display: flex; align-items: center;
    margin: 0 0 8px;
    cursor: pointer;
    border-radius: 4px;
  }
  .wf-tag-dot {
    width: 12px; height: 12px; border-radius: 50%;
    margin-right: 12px; flex-shrink: 0;
  }
  .wf-tag-name {
    flex-grow: 1; color: var(--nav-item-color);
    font-weight: bold; font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .wf-tag-value {
    font-size: 14px; font-weight: 400;
    flex-shrink: 0; margin-left: 8px;
  }
  .wf-tag-arrow {
    flex-shrink: 0; color: var(--text-muted);
    font-size: 11px; margin-left: 6px;
    user-select: none;
  }

  /* Unconfigured group */
  .wf-tag-group-row.unconfigured .wf-tag-name { color: var(--text-muted); }

  /* Collapsible file list */
  .wf-tag-files {
    position: relative;
    margin-left: 5.5px;
    padding-left: 20px;
    margin-bottom: 8px;
  }
  .wf-tag-files::before {
    content: '';
    position: absolute;
    left: 0; top: -4px; bottom: -4px;
    width: 1px;
    background: var(--background-modifier-border);
  }

  /* File row inside tag group */
  .wf-tag-file-row {
    display: flex; align-items: center;
    gap: 8px; margin-bottom: 8px;
  }
  .wf-tag-file-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .wf-tag-filename {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--nav-item-color); cursor: pointer; font-size: 13px;
  }
  /* Source tag pills */
  .wf-tags-container {
    display: flex; gap: 4px; flex-shrink: 1; min-width: 0;
    overflow: hidden;
  }
  .wf-tag-pill {
    display: inline-block;
    padding: 1px 6px; border-radius: 10px;
    font-size: 11px; line-height: 1.4;
    background: var(--background-modifier-border);
    color: var(--text-muted);
    border: 1px solid var(--background-modifier-border);
    white-space: nowrap; flex-shrink: 0;
  }
  .wf-tag-file-value {
    font-size: 13px; font-weight: 400; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="ob-window">
  <div class="ob-titlebar">
    <div class="ob-titlebar-dot red"></div>
    <div class="ob-titlebar-dot yellow"></div>
    <div class="ob-titlebar-dot green"></div>
    <span class="ob-titlebar-title">Wordflow Tracker</span>
  </div>

  <div class="ob-panel">

    <!-- Title + view switcher -->
    <div class="wf-title-row">
      <span class="wf-title">Daily Notes</span>
      <div class="wf-view-switcher">
        <button class="wf-view-btn" title="File List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </button>
        <!-- tag-list active -->
        <button class="wf-view-btn active" title="Tag List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </button>
        <button class="wf-view-btn" title="Heatmap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Current note row -->
    <div class="wf-current-note">
      <div class="wf-current-note-left">
        <div class="wf-current-note-text">
          <span class="wf-current-note-label">Meeting Summary</span>
          <span class="wf-current-note-value">900</span>
        </div>
        <div class="wf-bar-container">
          <span class="wf-bar-existing" style="width:57%"></span>
          <span class="wf-bar-current" style="width:43%"></span>
        </div>
      </div>
      <div class="wf-current-note-buttons">
        <!-- record button: file-clock icon (record wordflows to periodic notes) -->
        <div class="wf-btn-circle" title="record wordflows to periodic notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <circle cx="12" cy="15" r="3"/>
            <line x1="12" y1="12" x2="12" y2="15"/>
          </svg>
        </div>
        <!-- focus button: play icon -->
        <div class="wf-btn-circle" title="start focusing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Controls row -->
    <div class="wf-controls">
      <span class="wf-period-name">Today</span>
      <div class="wf-field-total">
        <span class="wf-field-name">Words</span>:
        <span>8,472</span>
      </div>
    </div>

    <!-- Tag list content (rendered by JS) -->
    <div id="tag-list-content"></div>

  </div>
</div>

<script>
// ── Canonical data (mirrors promo-file-list.html exactly) ────────────────────
// Tag color: user-configured hex (fixed)
// File color: hsl(H, S%, 60%), H from tag, S by alpha-sorted position in group
//   2 files → S: 52 (alpha-first), 69 (alpha-second)
//
// Writing  H=0:   "Chapter 3" < "Chapter 4"       → S=52, S=69
// Research H=210: "Reading Notes" < "Research Notes" → S=52, S=69
// Work     H=145: "Meeting Summary" < "Project Outline" → S=52, S=69

const tagGroups = [
  {
    name: 'Writing',
    color: '#e05c5c',
    value: 4217,
    files: [
      { name: 'Chapter 3 – Revision', color: 'hsl(0,52%,60%)',   value: 2341, tags: ['#writing'] },
      { name: 'Chapter 4 – Draft',    color: 'hsl(0,69%,60%)',   value: 1876, tags: ['#writing'] },
    ]
  },
  {
    name: 'Research',
    color: '#3a8fd4',
    value: 2486,
    files: [
      { name: 'Research Notes',        color: 'hsl(210,69%,60%)', value: 1486, tags: ['#research'] },
      { name: 'Reading Notes – Vol.2', color: 'hsl(210,52%,60%)', value: 1000, tags: ['#research'] },
    ]
  },
  {
    name: 'Work',
    color: '#3aaa6e',
    value: 1386,
    files: [
      { name: 'Project Outline',  color: 'hsl(145,69%,60%)', value:  874, tags: ['#work'] },
      { name: 'Meeting Summary',  color: 'hsl(145,52%,60%)', value:  512, tags: ['#work'] },
    ]
  },
];

const unconfigured = {
  color: '#999999',
  value: 383,
  files: [
    { name: 'Inbox', color: '#999999', value: 383, tags: [] },
  ]
};

const total = tagGroups.reduce((s, g) => s + g.value, 0) + unconfigured.value; // 8472

// All files flat, sorted desc by value (for file layer in progress bar)
const allFiles = [
  { color: 'hsl(0,52%,60%)',   value: 2341 },
  { color: 'hsl(0,69%,60%)',   value: 1876 },
  { color: 'hsl(210,69%,60%)', value: 1486 },
  { color: 'hsl(210,52%,60%)', value: 1000 },
  { color: 'hsl(145,69%,60%)', value:  874 },
  { color: 'hsl(145,52%,60%)', value:  512 },
  { color: '#999999',           value:  383 },
];

const container = document.getElementById('tag-list-content');

// ── Dual-layer progress bar ───────────────────────────────────────────────────
const dual = document.createElement('div');
dual.className = 'wf-dual-layer';

// Tag layer (upper, 16px)
const tagLayer = document.createElement('div');
tagLayer.className = 'wf-tag-layer';
[...tagGroups, { color: unconfigured.color, value: unconfigured.value }].forEach(g => {
  const seg = document.createElement('div');
  seg.className = 'wf-seg';
  seg.style.width = `${(g.value / total * 100).toFixed(2)}%`;
  seg.style.backgroundColor = g.color;
  tagLayer.appendChild(seg);
});
dual.appendChild(tagLayer);

// File layer (lower, 4px)
const fileLayer = document.createElement('div');
fileLayer.className = 'wf-file-layer';
allFiles.forEach(f => {
  const seg = document.createElement('div');
  seg.className = 'wf-seg';
  seg.style.width = `${(f.value / total * 100).toFixed(2)}%`;
  seg.style.backgroundColor = f.color;
  fileLayer.appendChild(seg);
});
dual.appendChild(fileLayer);
container.appendChild(dual);

// ── Tag group list ────────────────────────────────────────────────────────────
const listDiv = document.createElement('div');
listDiv.className = 'wf-tag-list';

function makeTagGroup(group, isUnconfigured = false) {
  const row = document.createElement('div');
  row.className = 'wf-tag-group-row' + (isUnconfigured ? ' unconfigured' : '');

  const dot = document.createElement('span');
  dot.className = 'wf-tag-dot';
  dot.style.backgroundColor = group.color;

  const name = document.createElement('span');
  name.className = 'wf-tag-name';
  name.textContent = isUnconfigured ? 'Others' : group.name;

  const val = document.createElement('span');
  val.className = 'wf-tag-value';
  val.style.color = group.color;
  val.textContent = group.value.toLocaleString();

  const arrow = document.createElement('span');
  arrow.className = 'wf-tag-arrow';
  arrow.textContent = '▼';

  row.appendChild(dot);
  row.appendChild(name);
  row.appendChild(val);
  row.appendChild(arrow);

  // File list container (collapsible)
  const filesDiv = document.createElement('div');
  filesDiv.className = 'wf-tag-files';
  filesDiv.style.display = 'none';

  group.files.forEach(f => {
    const fileRow = document.createElement('div');
    fileRow.className = 'wf-tag-file-row';

    const fdot = document.createElement('span');
    fdot.className = 'wf-tag-file-dot';
    fdot.style.backgroundColor = f.color;

    const fname = document.createElement('span');
    fname.className = 'wf-tag-filename';
    fname.textContent = f.name;

    const tagsWrap = document.createElement('span');
    tagsWrap.className = 'wf-tags-container';
    f.tags.forEach(t => {
      const pill = document.createElement('span');
      pill.className = 'wf-tag-pill';
      pill.textContent = t;
      tagsWrap.appendChild(pill);
    });

    const fval = document.createElement('span');
    fval.className = 'wf-tag-file-value';
    fval.style.color = f.color;
    fval.textContent = f.value.toLocaleString();

    fileRow.appendChild(fdot);
    fileRow.appendChild(fname);
    fileRow.appendChild(tagsWrap);
    fileRow.appendChild(fval);
    filesDiv.appendChild(fileRow);
  });

  let collapsed = true;
  row.addEventListener('click', () => {
    collapsed = !collapsed;
    filesDiv.style.display = collapsed ? 'none' : 'block';
    arrow.textContent = collapsed ? '▼' : '▲';
  });

  listDiv.appendChild(row);
  listDiv.appendChild(filesDiv);
}

// Render groups; expand Writing by default to showcase the feature
tagGroups.forEach((g, i) => {
  makeTagGroup(g);
  if (i === 0) {
    const files = listDiv.lastElementChild;
    const row   = files.previousElementSibling;
    files.style.display = 'block';
    row.querySelector('.wf-tag-arrow').textContent = '▲';
  }
});
makeTagGroup(unconfigured, true);

container.appendChild(listDiv);
</script>
</body>
</html>
